# 创建 broker.conf
cat > broker.conf <<EOF
# 集群名称
brokerClusterName = DefaultCluster
# Broker 名称
brokerName = broker
# Broker ID (0 表示 master)
brokerId = 0
# NameServer 地址
namesrvAddr = namesrv:9876
# 删除文件时间点（凌晨4点）
deleteWhen = 04
# 文件保留时间（48小时）
fileReservedTime = 48
# Broker 角色
brokerRole = ASYNC_MASTER
# 刷盘方式
flushDiskType = ASYNC_FLUSH
# Broker IP 自动检测
brokerIP1 = broker
# 允许自动创建Topic
autoCreateTopicEnable=true
# 代理模式（推荐使用 LOCAL 模式）
proxyMode = LOCAL
EOF